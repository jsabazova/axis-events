<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Axis Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:        #00b050;
      --green-hover:  #009140;
      --green-dark:   #007a35;
      --green-bg:     #e8f9ef;
      --green-border: rgba(0,176,80,0.22);
      --dark:         #1a1c1e;
      --white:        #ffffff;
      --off-white:    #f5f5f3;
      --border:       #e5e5e3;
      --text:         #141414;
      --text-muted:   #6b7280;
      --text-faint:   #a0a0a0;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    .contact-page { min-height: 100vh; position: relative; overflow: hidden; padding: 80px 40px; }

    .deco-lines { position: absolute; top: 0; right: 0; width: 480px; height: 480px; pointer-events: none; z-index: 0; }
    .deco-lines svg { width: 100%; height: 100%; }
    .deco-lines-bl { position: absolute; bottom: 0; left: 0; width: 320px; height: 320px; pointer-events: none; z-index: 0; opacity: 0.5; }
    .deco-lines-bl svg { width: 100%; height: 100%; }

    .contact-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }

    .contact-intro { margin-bottom: 64px; }
    .eyebrow { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green-dark); margin-bottom: 14px; }
    .contact-intro h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(32px, 4vw, 54px); letter-spacing: -0.028em; line-height: 1.06; color: var(--text); margin-bottom: 16px; }
    .contact-intro h1 em { font-style: normal; color: var(--green); }
    .contact-intro p { font-size: 15.5px; line-height: 1.72; color: var(--text-muted); max-width: 420px; }

    .contact-layout { display: grid; grid-template-columns: 1fr 340px; gap: 80px; align-items: start; }

    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label { font-size: 12.5px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
    .field input, .field textarea {
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 12px 14px; outline: none;
      transition: border-color 0.18s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--green); }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-faint); }
    .field textarea { resize: vertical; min-height: 110px; }

    .time-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .time-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); background: var(--white); border: 1.5px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: all 0.18s; }
    .time-btn:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }
    .time-btn.selected { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }

    /* CONTACT TYPE */
    .contact-type { display: flex; gap: 10px; }
    .type-btn { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); background: var(--white); border: 1.5px solid var(--border); padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: all 0.18s; text-align: center; }
    .type-btn:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }
    .type-btn.selected { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }

    .btn-submit { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--white); background: var(--green); border: none; padding: 14px 28px; border-radius: 9px; cursor: pointer; transition: background 0.18s, transform 0.15s; margin-top: 4px; }
    .btn-submit:hover { background: var(--green-hover); transform: translateY(-1px); }
    .btn-submit svg { width: 13px; height: 13px; }

    .contact-details { display: flex; flex-direction: column; gap: 24px; padding-top: 4px; }
    .detail-divider { height: 1.5px; background: var(--border); }

    .response-badge { display: flex; align-items: flex-start; gap: 12px; background: var(--green-bg); border: 1.5px solid var(--green-border); border-radius: 14px; padding: 18px 20px; }
    .response-badge-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%;

    .quote-nudge { background: var(--off-white); border: 1.5px solid var(--border); border-radius: 14px; padding: 22px 22px; }
    .quote-nudge p { font-size: 13.5px; line-height: 1.65; color: var(--text-muted); margin-bottom: 12px; }
    .quote-nudge a { display: inline-flex; align-items: center; gap: 5px; font-size: 13.5px; font-weight: 600; color: var(--green-dark); text-decoration: none; }
    .quote-nudge a:hover { color: var(--green); }
    .quote-nudge a svg { width: 12px; height: 12px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fu { animation: fadeUp 0.55s ease both; }
    .fu1{animation-delay:0.04s} .fu2{animation-delay:0.13s} .fu3{animation-delay:0.22s}

    @media (max-width: 1080px) {
      .contact-layout { grid-template-columns: 1fr; gap: 52px; }
    }
    @media (max-width: 760px) {
      .contact-page { padding: 60px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .deco-lines { width: 260px; height: 260px; }
      .deco-lines-bl { display: none; }
    }
  </style>
</head>
<body>

<div class="contact-page">

  <div class="deco-lines">
    <svg viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 480 40 L 380 40 Q 360 40 360 60 L 360 140" stroke="#00b050" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
      <path d="M 480 120 L 420 120 Q 400 120 400 140 L 400 220 Q 400 240 380 240 L 300 240" stroke="#00b050" stroke-width="1.5" stroke-opacity="0.18" fill="none"/>
      <path d="M 480 80 L 440 80" stroke="#00b050" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
      <path d="M 480 200 L 460 200" stroke="#00b050" stroke-width="1" stroke-opacity="0.3" fill="none"/>
      <path d="M 480 320 L 360 320 Q 340 320 340 300 L 340 260" stroke="#00b050" stroke-width="1" stroke-opacity="0.15" fill="none"/>
      <circle cx="360" cy="140" r="3" fill="#00b050" fill-opacity="0.3"/>
      <circle cx="400" cy="240" r="3" fill="#00b050" fill-opacity="0.2"/>
    </svg>
  </div>

  <div class="deco-lines-bl">
    <svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0 280 L 100 280 Q 120 280 120 260 L 120 180" stroke="#00b050" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>
      <path d="M 0 200 L 60 200 Q 80 200 80 180 L 80 120" stroke="#00b050" stroke-width="1" stroke-opacity="0.15" fill="none"/>
      <path d="M 0 320 L 40 320" stroke="#00b050" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
    </svg>
  </div>

  <div class="contact-inner">

    <div class="contact-intro fu fu1">
      <span class="eyebrow">Get in touch</span>
      <h1>Still got questions?<br><em>Drop your details.</em></h1>
      
    </div>

    <div class="contact-layout">

      <form class="contact-form fu fu2">
        <div class="form-row">
          <div class="field">
            <label>Name</label>
            <input type="text" placeholder="Your name" />
          </div>
          <div class="field">
            <label>Company</label>
            <input type="text" placeholder="Company name" />
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Email</label>
            <input type="email" placeholder="you@company.com" />
          </div>
          <div class="field">
            <label>Phone</label>
            <input type="tel" placeholder="+61" />
          </div>
        </div>
        <div class="field">
          <label>Event name</label>
          <input type="text" placeholder="What event are you running?" />
        </div>
        
        <div class="field">
          <label>Preferred response</label>
          <div class="contact-type">
            <button type="button" class="type-btn" onclick="selectType(this)">Call me</button>
            <button type="button" class="type-btn" onclick="selectType(this)">Email me</button>
            <button type="button" class="type-btn" onclick="selectType(this)">No preference</button>
          </div>
        </div>
        <div class="field" id="call-time-field" style="display:none;">
          <label>Best time to call <span style="font-weight:400; color:var(--text-faint); font-size:11px;">— select all that apply</span></label>
          <div class="time-options">
            <button type="button" class="time-btn" onclick="toggleTime(this)">Morning (9am – 12pm)</button>
            <button type="button" class="time-btn" onclick="toggleTime(this)">Afternoon (12pm – 5pm)</button>
            <button type="button" class="time-btn" onclick="toggleTime(this)">Anytime</button>
          </div>
        </div>
        <div class="field">
          <label>Anything else we should know?</label>
          <textarea placeholder="Any questions, concerns, or context that might help us..."></textarea>
        </div>
        <div>
          <button type="submit" class="btn-submit">Send message <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg></button>
        </div>
      </form>

      <div class="contact-details fu fu3">
        <div class="response-badge"><div class="response-badge-dot"></div><p><strong>We'll get back to you within 24 hours.</strong> It's easier that way — right person, right answers.</p></div>
        
      </div>

    </div>
  </div>
</div>

<script>
  function toggleTime(btn) {
    if (btn.textContent.trim() === 'Anytime') {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    } else {
      document.querySelectorAll('.time-btn').forEach(b => { if (b.textContent.trim() === 'Anytime') b.classList.remove('selected'); });
      btn.classList.toggle('selected');
    }
  }
  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const callTimeField = document.getElementById('call-time-field');
    callTimeField.style.display = btn.textContent.trim() === 'Email me' ? 'none' : 'flex';
    callTimeField.style.flexDirection = 'column';
  }
</script>

</body>
</html>
